<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Premium Mobile Locksmith</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="Create a secure account with Mobile Locksmith. Register to book services, view audit reports, and schedule keyless lock setups.">
  <meta name="author" content="Antigravity">
  
  <!-- Premium Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================================
       1. CSS VARIABLES & DESIGN SYSTEM (HSL-tailored colors matching other pages)
       ========================================================================== */
    :root {
      /* Typography */
      --font-heading: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;

      /* Colors - Light Mode Defaults */
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      
      --accent-primary: #d4af37;      /* Metallic Gold / Brass */
      --accent-secondary: #aa7c11;    /* Deep Gold */
      --accent-gradient: linear-gradient(135deg, #d4af37 0%, #aa7c11 100%);
      --accent-glow: rgba(212, 175, 55, 0.15);
      
      --border-color: rgba(15, 23, 42, 0.08);
      --nav-bg: rgba(255, 255, 255, 0.7);
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 20px 50px -12px rgba(15, 23, 42, 0.08);
      
      --grid-line-color: rgba(15, 23, 42, 0.04);
      --mesh-color-1: rgba(212, 175, 55, 0.05);
      --mesh-color-2: rgba(170, 124, 17, 0.05);

      --border-radius: 20px;
      --transition-speed: 0.3s;
      --transition-timing: cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Dark Mode Overrides */
    html.dark {
      --bg-primary: #0b0f19;
      --bg-secondary: #111827;
      --bg-tertiary: #1f2937;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      
      --accent-primary: #ffd700;      /* Bright Gold */
      --accent-secondary: #f39c12;    /* Amber Orange/Gold */
      --accent-gradient: linear-gradient(135deg, #ffd700 0%, #f39c12 100%);
      --accent-glow: rgba(255, 215, 0, 0.25);
      
      --border-color: rgba(255, 255, 255, 0.08);
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
      --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 20px 50px -10px rgba(0, 0, 0, 0.5);
      
      --grid-line-color: rgba(255, 255, 255, 0.02);
      --mesh-color-1: rgba(255, 215, 0, 0.03);
      --mesh-color-2: rgba(243, 156, 18, 0.03);
    }

    /* ==========================================================================
       2. RESET & BASE STYLES
       ========================================================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color var(--transition-speed) var(--transition-timing), 
                  border-color var(--transition-speed) var(--transition-timing), 
                  color var(--transition-speed) var(--transition-timing);
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    [dir="rtl"] {
      text-align: right;
    }

    /* ==========================================================================
       3. AMBIENT BACKGROUND SYSTEM
       ========================================================================== */
    .bg-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      background-size: 40px 40px;
      background-image: 
        linear-gradient(to right, var(--grid-line-color) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line-color) 1px, transparent 1px);
    }

    .bg-mesh-1, .bg-mesh-2 {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(140px);
      z-index: -2;
      opacity: 0.8;
      pointer-events: none;
      animation: float 20s infinite alternate ease-in-out;
    }

    .bg-mesh-1 {
      top: -10%;
      left: -10%;
      background: var(--mesh-color-1);
    }

    .bg-mesh-2 {
      bottom: 10%;
      right: -10%;
      background: var(--mesh-color-2);
      animation-delay: -5s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(100px, 50px) scale(1.2); }
    }

    /* ==========================================================================
       4. TOP RIGHT FLOATING CONTROLS
       ========================================================================== */
    .top-controls {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 12px;
      z-index: 100;
    }

    [dir="rtl"] .top-controls {
      right: auto;
      left: 24px;
    }

    .control-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      background-color: var(--bg-secondary);
      box-shadow: var(--shadow-sm);
      transition: all 0.25s var(--transition-timing);
      cursor: pointer;
    }

    .control-btn:hover {
      color: var(--text-primary);
      border-color: var(--accent-primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .control-btn-icon {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
      transition: transform 0.4s var(--transition-timing);
    }

    /* Sun/Moon Morphing Specifics */
    .sun-icon {
      display: none;
    }
    
    html.dark .moon-icon {
      display: none;
    }
    
    html.dark .sun-icon {
      display: block;
      animation: rotateSun 10s infinite linear;
    }

    @keyframes rotateSun {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .rtl-icon {
      transition: transform 0.4s ease;
    }

    [dir="rtl"] .rtl-icon {
      transform: scaleX(-1);
    }

    /* ==========================================================================
       5. CENTERED GLASSMORPHIC CARD
       ========================================================================== */
    .register-container {
      min-height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 20px;
      position: relative;
      z-index: 10;
    }

    .register-card {
      width: 100%;
      max-width: 460px;
      background-color: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-lg);
      padding: 24px 30px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      transform: translateY(0);
      transition: border-color var(--transition-speed) ease, box-shadow var(--transition-speed) ease;
    }

    html.dark .register-card {
      background-color: rgba(17, 24, 39, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* Centered Brand Styling */
    .brand-container {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      text-decoration: none;
    }

    .brand-logo-svg {
      width: 42px;
      height: 42px;
      fill: none;
      filter: drop-shadow(0 0 4px var(--accent-glow));
      animation: pulseLogo 3s infinite ease-in-out;
      transition: transform 0.3s ease;
    }

    .brand:hover .brand-logo-svg {
      transform: scale(1.1) rotate(5deg);
    }

    @keyframes pulseLogo {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 2px var(--accent-glow)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 8px var(--accent-glow)); }
    }

    /* ==========================================================================
       6. FORM CONTROLS & INPUTS
       ========================================================================== */
    .form-group {
      margin-bottom: 12px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      height: 48px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      padding: 0 16px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      transition: border-color var(--transition-speed) ease, box-shadow var(--transition-speed) ease;
    }

    .form-input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* Password field styling with visibility icon spacing */
    .password-input-wrapper .form-input {
      padding-right: 48px;
    }

    [dir="rtl"] .password-input-wrapper .form-input {
      padding-right: 16px;
      padding-left: 48px;
    }

    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
      z-index: 5;
    }

    [dir="rtl"] .password-toggle {
      right: auto;
      left: 16px;
    }

    .password-toggle:hover {
      color: var(--text-primary);
    }

    .password-toggle-icon {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
    }

    /* Customized checkbox styles */
    .checkbox-container {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 8px;
      margin-bottom: 14px;
      cursor: pointer;
      user-select: none;
      width: 100%;
    }

    .checkbox-container input {
      position: absolute;
      opacity: 0;
      cursor: pointer;
      height: 0;
      width: 0;
    }

    .custom-checkbox {
      height: 20px;
      width: 20px;
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .checkbox-container:hover input ~ .custom-checkbox {
      border-color: var(--accent-primary);
      box-shadow: 0 0 6px var(--accent-glow);
    }

    .checkbox-container input:checked ~ .custom-checkbox {
      background: var(--accent-gradient);
      border-color: transparent;
    }

    .custom-checkbox svg {
      display: none;
      width: 12px;
      height: 12px;
      fill: none;
      stroke: white;
      stroke-width: 3;
    }

    .checkbox-container input:checked ~ .custom-checkbox svg {
      display: block;
    }

    .checkbox-label {
      font-size: 0.82rem;
      color: var(--text-secondary);
      font-weight: 500;
      transition: color 0.25s ease;
      line-height: 1.4;
    }

    .checkbox-container:hover .checkbox-label {
      color: var(--text-primary);
    }

    .terms-link {
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .terms-link:hover {
      color: var(--accent-secondary);
      text-decoration: underline;
    }

    /* ==========================================================================
       7. BUTTONS (Register Button & Log In Button)
       ========================================================================== */
    .register-btn {
      width: 100%;
      height: 48px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #ffffff;
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 15px var(--accent-glow);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.25s var(--transition-timing);
      cursor: pointer;
    }

    .register-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -50%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.25),
        transparent
      );
      transform: skewX(-25deg);
      transition: 0.75s ease;
    }

    .register-btn:hover::before {
      left: 125%;
    }

    .register-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--accent-glow);
      filter: brightness(1.05);
    }

    .register-btn:active {
      transform: translateY(0);
    }

    .padlock-svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #ffffff;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .padlock-shackle {
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform-origin: 12px 6px;
    }

    .register-btn:hover .padlock-shackle {
      transform: translateY(-2px) rotate(45deg);
    }

    /* Log in redirect secondary button styling */
    .login-redirect-container {
      margin-top: 16px;
    }

    .login-redirect-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 48px;
      border-radius: 12px;
      border: 1.5px solid var(--accent-primary);
      color: var(--accent-primary);
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.25s ease;
      text-decoration: none;
      background-color: transparent;
    }

    .login-redirect-btn:hover {
      background-color: var(--accent-glow);
      color: var(--accent-secondary);
      border-color: var(--accent-secondary);
      transform: translateY(-2px);
    }

    .login-redirect-btn:active {
      transform: translateY(0);
    }

    /* ==========================================================================
       8. SOCIAL SIGNUP (Google, Facebook, Apple)
       ========================================================================== */
    .divider-wrapper {
      display: flex;
      align-items: center;
      margin: 14px 0;
      text-align: center;
    }

    .divider-line {
      flex-grow: 1;
      height: 1px;
      background-color: var(--border-color);
    }

    .divider-text {
      padding: 0 16px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .social-wrapper {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    .social-btn {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: all 0.25s ease;
      cursor: pointer;
    }

    .social-btn:hover {
      border-color: var(--accent-primary);
      color: var(--text-primary);
      background-color: var(--bg-tertiary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .social-icon {
      width: 22px;
      height: 22px;
      transition: transform 0.25s ease;
    }

    .social-btn:hover .social-icon {
      transform: scale(1.08);
    }

    /* Brand-specific Colors on Hover */
    .social-btn.google:hover {
      color: #ea4335;
    }
    .social-btn.facebook:hover {
      color: #1877f2;
    }
    .social-btn.apple:hover {
      color: var(--text-primary);
    }
  </style>

<body>

  <!-- Background Ambient System -->
  <div class="bg-grid"></div>
  <div class="bg-mesh-1"></div>
  <div class="bg-mesh-2"></div>

  <!-- Floating Utility controls (Top Right) -->
  <div class="top-controls">
    <!-- RTL Layout Toggle -->
    <button class="control-btn" id="rtlToggleBtn" aria-label="Toggle layout direction" title="Right to Left Toggle">
      <i class="fa-solid fa-right-left control-btn-icon rtl-icon"></i>
    </button>

    <!-- Dark Mode Theme Toggle -->
    <button class="control-btn" id="darkModeBtn" aria-label="Toggle dark mode" title="Dark Mode Toggle">
      <!-- Sun SVG (Dark Mode active) -->
      <svg class="control-btn-icon sun-icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5" />
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-linecap="round"/>
      </svg>
      <!-- Moon SVG (Light Mode active) -->
      <svg class="control-btn-icon moon-icon" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Centered Register Layout -->
  <main class="register-container">
    <div class="register-card">
      
      <!-- Brand Logo Header -->
      <div class="brand-container">
        <a href="index.html" class="brand">
          <svg class="brand-logo-svg" viewBox="0 0 100 100">
            <defs>
              <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="var(--accent-primary)" />
                <stop offset="100%" stop-color="var(--accent-secondary)" />
              </linearGradient>
            </defs>
            <!-- Lock Shackle -->
            <path d="M30,40 V28 A20,20 0 0,1 70,28 V40" stroke="url(#logoGradient)" stroke-width="8" stroke-linecap="round" fill="none" />
            <!-- Lock Body (Shield shape) -->
            <path d="M20,40 H80 V65 C80,80 50,92 50,92 C50,92 20,80 20,65 Z" fill="var(--bg-secondary)" stroke="url(#logoGradient)" stroke-width="8" stroke-linejoin="round" />
            <!-- Center Keyhole -->
            <path d="M50,52 A6,6 0 1,0 50,64 L53,74 H47 L50,64 Z" fill="url(#logoGradient)" />
          </svg>
          <span>LOCKSMITH</span>
        </a>
      </div>

      <!-- Registration Form -->
      <form id="registerForm" onsubmit="event.preventDefault(); alert('Account registration simulated successfully!');">
        
        <!-- Full Name input -->
        <div class="form-group">
          <label for="nameInput" class="form-label">Full Name</label>
          <div class="input-wrapper">
            <input type="text" id="nameInput" class="form-input" placeholder="Enter your full name" required autocomplete="name">
          </div>
        </div>

        <!-- Username/Email input -->
        <div class="form-group">
          <label for="usernameInput" class="form-label">Email Address</label>
          <div class="input-wrapper">
            <input type="email" id="usernameInput" class="form-input" placeholder="e.g. secure@example.com" required autocomplete="email">
          </div>
        </div>

        <!-- Password input with eye toggle icon -->
        <div class="form-group">
          <label for="passwordInput" class="form-label">Password</label>
          <div class="input-wrapper password-input-wrapper">
            <input type="password" id="passwordInput" class="form-input" placeholder="Create a strong password" required autocomplete="new-password">
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
              <!-- Eye Open SVG -->
              <svg class="password-toggle-icon eye-open" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2.2" />
              </svg>
              <!-- Eye Closed SVG -->
              <svg class="password-toggle-icon eye-closed" viewBox="0 0 24 24" style="display: none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
                <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Confirm Password input with eye toggle icon -->
        <div class="form-group">
          <label for="confirmPasswordInput" class="form-label">Confirm Password</label>
          <div class="input-wrapper password-input-wrapper">
            <input type="password" id="confirmPasswordInput" class="form-input" placeholder="Repeat your password" required autocomplete="new-password">
            <button type="button" class="password-toggle" id="confirmPasswordToggle" aria-label="Toggle password visibility">
              <!-- Eye Open SVG -->
              <svg class="password-toggle-icon eye-open" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2.2" />
              </svg>
              <!-- Eye Closed SVG -->
              <svg class="password-toggle-icon eye-closed" viewBox="0 0 24 24" style="display: none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
                <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
              </svg>
            </button>

        </div>

        <!-- Checkbox: Agree to terms -->
        <label class="checkbox-container">
          <input type="checkbox" id="termsInput" required>
          <span class="custom-checkbox">
            <svg viewBox="0 0 24 24">
              <polyline points="20 6 9 17 4 12" stroke="currentColor"/>

          </span>
          <span class="checkbox-label">I agree to the <a href="#terms" class="terms-link">Terms of Service</a> & <a href="#privacy" class="terms-link">Privacy Policy</a></span>
        </label>

        <!-- Submit Register Button with Shackle Animation -->
        <button type="submit" class="register-btn" id="submitBtn">
          <svg class="padlock-svg" viewBox="0 0 24 24">
            <path class="padlock-shackle" id="btnShackle" d="M7 11V7a5 5 0 0 1 10 0v4" />
            <rect x="4" y="11" width="16" height="11" rx="2" ry="2" fill="currentColor" fill-opacity="0.1" />
            <circle cx="12" cy="16" r="1.5" />
          </svg>
          <span>Register Account</span>
        </button>

      </form>

      <!-- Separator: Continue with other -->
      <div class="divider-wrapper">
        <span class="divider-line"></span>
        <span class="divider-text">Or sign up with</span>
        <span class="divider-line"></span>
      </div>

      <!-- Social Logins (Google, Facebook, Apple) -->
      <div class="social-wrapper">
        <!-- Google Button -->
        <button type="button" class="social-btn google" aria-label="Sign up with Google" onclick="alert('Google registration simulated successfully.');">

  <!-- ==========================================================================
       9. INTERACTIVE JAVASCRIPT CONTROLLERS
       ========================================================================== -->
  <script>
    // 9.1 Theme Controllers (Dual-Bind Theme controls)
    const darkModeBtn = document.getElementById('darkModeBtn');
    
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }
    }
    
    function toggleTheme() {
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    initTheme();
    darkModeBtn.addEventListener('click', toggleTheme);

    // 9.2 RTL Layout Controllers (Text direction toggle)
    const rtlToggleBtn = document.getElementById('rtlToggleBtn');
    
    function initRtl() {
      const savedRtl = localStorage.getItem('rtl');
      if (savedRtl === 'rtl') {
        document.documentElement.dir = 'rtl';
      } else {
        document.documentElement.dir = 'ltr';
      }
    }

    function toggleRtl() {
      const currentDir = document.documentElement.dir || 'ltr';
      if (currentDir === 'ltr') {
        document.documentElement.dir = 'rtl';
        localStorage.setItem('rtl', 'rtl');
      } else {
        document.documentElement.dir = 'ltr';
        localStorage.setItem('rtl', 'ltr');
      }
    }

    initRtl();
    rtlToggleBtn.addEventListener('click', toggleRtl);

    // 9.3 Password Visibility Toggle Action
    const passwordInput = document.getElementById('passwordInput');
    const passwordToggle = document.getElementById('passwordToggle');
    const eyeOpen = passwordToggle.querySelector('.eye-open');
    const eyeClosed = passwordToggle.querySelector('.eye-closed');

    passwordToggle.addEventListener('click', () => {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeOpen.style.display = 'none';
        eyeClosed.style.display = 'block';
        passwordToggle.setAttribute('aria-label', 'Hide password');
      } else {
        passwordInput.type = 'password';
        eyeOpen.style.display = 'block';
        eyeClosed.style.display = 'none';
        passwordToggle.setAttribute('aria-label', 'Show password');
      }
    });

    // 9.4 Confirm Password Visibility Toggle Action
    const confirmPasswordInput = document.getElementById('confirmPasswordInput');
    const confirmPasswordToggle = document.getElementById('confirmPasswordToggle');
    const confirmEyeOpen = confirmPasswordToggle.querySelector('.eye-open');
    const confirmEyeClosed = confirmPasswordToggle.querySelector('.eye-closed');

    confirmPasswordToggle.addEventListener('click', () => {
      if (confirmPasswordInput.type === 'password') {
        confirmPasswordInput.type = 'text';
        confirmEyeOpen.style.display = 'none';
        confirmEyeClosed.style.display = 'block';
        confirmPasswordToggle.setAttribute('aria-label', 'Hide password');
      } else {
        confirmPasswordInput.type = 'password';
        confirmEyeOpen.style.display = 'block';
        confirmEyeClosed.style.display = 'none';
        confirmPasswordToggle.setAttribute('aria-label', 'Show password');
      }
    });

    // 9.5 Submit Padlock micro-animation shackle trigger
    const submitBtn = document.getElementById('submitBtn');
    const btnShackle = document.getElementById('btnShackle');

    submitBtn.addEventListener('mouseenter', () => {
      btnShackle.style.transform = 'translateY(-2px) rotate(45deg)';
    });
    submitBtn.addEventListener('mouseleave', () => {
      btnShackle.style.transform = 'translateY(0) rotate(0)';
    });
  </script>
</body>
