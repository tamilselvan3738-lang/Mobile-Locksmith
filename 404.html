<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Keyway Not Found | Premium Mobile Locksmith</title>
  
  <!-- Premium Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================================
       1. CSS VARIABLES & DESIGN SYSTEM (Fluid Tokens & HSL-tailored colors)
       ========================================================================== */
    :root {
      /* Typography */
      --font-heading: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;

      /* Colors - Light Mode Defaults */
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      
      --accent-primary: #d4af37;      /* Metallic Gold / Brass */
      --accent-secondary: #aa7c11;    /* Deep Gold */
      --accent-gradient: linear-gradient(135deg, #d4af37 0%, #aa7c11 100%);
      --accent-glow: rgba(212, 175, 55, 0.15);
      
      --danger-primary: #ef4444;      /* Emergency Red */
      --danger-glow: rgba(239, 68, 68, 0.4);
      
      --border-color: rgba(15, 23, 42, 0.08);
      --nav-bg: rgba(255, 255, 255, 0.7);
      --nav-border: rgba(255, 255, 255, 0.5);
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 20px 40px -10px rgba(15, 23, 42, 0.1);
      
      /* Grid Ambient Animation Colors */
      --grid-line-color: rgba(15, 23, 42, 0.04);
      --mesh-color-1: rgba(212, 175, 55, 0.05);
      --mesh-color-2: rgba(170, 124, 17, 0.05);

      /* Layout */
      --border-radius: 20px;
      --transition-speed: 0.3s;
      --transition-timing: cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Dark Mode Overrides */
    html.dark {
      --bg-primary: #0b0f19;
      --bg-secondary: #111827;
      --bg-tertiary: #1f2937;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      
      --accent-primary: #ffd700;      /* Bright Gold */
      --accent-secondary: #f39c12;    /* Amber Orange/Gold */
      --accent-gradient: linear-gradient(135deg, #ffd700 0%, #f39c12 100%);
      --accent-glow: rgba(255, 215, 0, 0.25);
      
      --danger-primary: #ff4757;
      --danger-glow: rgba(255, 71, 87, 0.6);
      
      --border-color: rgba(255, 255, 255, 0.08);
      --nav-bg: rgba(11, 15, 25, 0.65);
      --nav-border: rgba(255, 255, 255, 0.08);
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
      --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 20px 50px -10px rgba(0, 0, 0, 0.5);
      
      --grid-line-color: rgba(255, 255, 255, 0.02);
      --mesh-color-1: rgba(255, 215, 0, 0.03);
      --mesh-color-2: rgba(243, 156, 18, 0.03);
    }

    /* ==========================================================================
       2. RESET & BASE STYLES
       ========================================================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color var(--transition-speed) var(--transition-timing), 
                  border-color var(--transition-speed) var(--transition-timing), 
                  color var(--transition-speed) var(--transition-timing);
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ==========================================================================
       3. AMBIENT BACKGROUND SYSTEM
       ========================================================================== */
    .bg-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      background-size: 40px 40px;
      background-image: 
        linear-gradient(to right, var(--grid-line-color) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line-color) 1px, transparent 1px);
    }

    .bg-mesh-1, .bg-mesh-2 {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(140px);
      z-index: -2;
      opacity: 0.8;
      pointer-events: none;
      animation: float 20s infinite alternate ease-in-out;
    }

    .bg-mesh-1 {
      top: -10%;
      left: -10%;
      background: var(--mesh-color-1);
    }

    .bg-mesh-2 {
      bottom: 10%;
      right: -10%;
      background: var(--mesh-color-2);
      animation-delay: -5s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(100px, 50px) scale(1.2); }
    }

    /* ==========================================================================
       4. 404 CONTENT STYLES
       ========================================================================== */
    .error-wrapper {
      max-width: 580px;
      width: 100%;
      padding: 60px 40px;
      background-color: var(--nav-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-lg);
      border-radius: var(--border-radius);
      text-align: center;
      position: relative;
      animation: floatUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes floatUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .error-illustration {
      width: 130px;
      height: 130px;
      margin-bottom: 24px;
      filter: drop-shadow(0 0 15px rgba(255, 71, 87, 0.15));
      transition: filter 0.3s ease;
    }
    
    .error-illustration:hover {
      filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.35));
    }

    .shackle-svg {
      animation: alertShackle 2.5s infinite ease-in-out;
      transform-origin: 30px 45px;
    }

    @keyframes alertShackle {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-12deg); }
    }

    .error-code {
      font-family: var(--font-heading);
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -2px;
    }

    .error-title {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 18px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .error-desc {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 35px;
    }

    .btn-terminal {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 32px;
      border-radius: 12px;
      background: var(--accent-gradient);
      color: #0b0f19;
      font-family: var(--font-heading);
      font-size: 0.9rem;
      font-weight: 700;
      box-shadow: 0 4px 20px var(--accent-glow);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .btn-terminal:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 30px var(--accent-glow);
      filter: brightness(1.1);
    }
    
    .btn-terminal:active {
      transform: translateY(0) scale(0.98);
    }

    /* ==========================================================================
       5. FLOATING ACTION BUTTON (FAB) FOR EMERGENCY CALLS
       ========================================================================== */
    .fab-container {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    [dir="rtl"] .fab-container {
      right: auto;
      left: 30px;
      flex-direction: row-reverse;
    }

    .fab-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--danger-primary) 0%, #c53030 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px var(--danger-glow);
      cursor: pointer;
      position: relative;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .fab-btn:hover {
      transform: scale(1.1) translateY(-3px);
      box-shadow: 0 8px 25px var(--danger-glow);
    }

    .fab-btn::before, .fab-btn::after {
      content: '';
      position: absolute;
      top: -4px;
      left: -4px;
      right: -4px;
      bottom: -4px;
      border-radius: 50%;
      border: 2px solid var(--danger-primary);
      opacity: 0;
      pointer-events: none;
      animation: fabPulse 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }

    .fab-btn::after {
      animation-delay: 1s;
    }

    @keyframes fabPulse {
      0% {
        transform: scale(0.95);
        opacity: 0.8;
      }
      100% {
        transform: scale(1.3);
        opacity: 0;
      }
    }

    .fab-icon {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: #ffffff;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      animation: fabPhoneWiggle 3.5s infinite ease-in-out;
    }

    @keyframes fabPhoneWiggle {
      0%, 90%, 100% { transform: rotate(0); }
      92% { transform: rotate(15deg); }
      94% { transform: rotate(-15deg); }
      96% { transform: rotate(15deg); }
      98% { transform: rotate(-15deg); }
    }

    .fab-tooltip {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 0.76rem;
      font-weight: 700;
      box-shadow: var(--shadow-md);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transform: translateX(10px);
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    [dir="rtl"] .fab-tooltip {
      transform: translateX(-10px);
    }

    .fab-container:hover .fab-tooltip {
      opacity: 1;
      transform: translateX(0);
    }

    /* ==========================================================================
       6. RESPONSIVENESS MEDIA QUERIES
       ========================================================================== */
    @media (max-width: 768px) {
      .fab-container {
        bottom: 20px;
        right: 20px;
      }
      [dir="rtl"] .fab-container {
        left: 20px;
        right: auto;
      }
      .fab-btn {
        width: 50px;
        height: 50px;
      }
      .fab-icon {
        width: 20px;
        height: 20px;
      }
      .fab-tooltip {
        display: none;
      }
    }

    @media (max-width: 600px) {
      .error-wrapper {
        padding: 40px 24px;
        margin: 10px;
      }
      .error-code {
        font-size: 4.5rem;
      }
      .error-title {
        font-size: 1.35rem;
      }
      .error-desc {
        font-size: 0.88rem;
        margin-bottom: 28px;
      }
      .btn-terminal {
        padding: 12px 24px;
        font-size: 0.85rem;
      }
    }

    /* Top Right Action Controls */
    .top-actions {
      position: absolute;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 12px;
      z-index: 100;
    }
    
    [dir="rtl"] .top-actions {
      right: auto;
      left: 24px;
    }

    /* Circular Utility Toggle Button Styles */
    .control-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      background-color: var(--bg-secondary);
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: all 0.25s var(--transition-timing);
      cursor: pointer;
    }

    .control-btn:hover {
      color: var(--text-primary);
      border-color: var(--accent-primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .control-btn-icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
      transition: transform 0.4s var(--transition-timing);
    }

    /* Sun/Moon Morphing Specifics */
    .sun-icon {
      display: none;
    }
    
    html.dark .moon-icon {
      display: none;
    }
    
    html.dark .sun-icon {
      display: block;
      animation: rotateSun 10s infinite linear;
    }

    @keyframes rotateSun {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* RTL Switch Animation */
    .rtl-icon {
      transition: transform 0.4s ease;
    }

    [dir="rtl"] .rtl-icon {
      transform: scaleX(-1);
    }

    @media (max-width: 600px) {
      .top-actions {
        top: 16px;
        right: 16px;
      }
      [dir="rtl"] .top-actions {
        right: auto;
        left: 16px;
      }
    }
  </style>
  <link rel="stylesheet" href="responsive.css">

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Top Right Action Controls -->
  <div class="top-actions">
    <!-- Right to Left Toggle -->
    <button class="control-btn" id="rtlToggleBtn" aria-label="Toggle layout direction" title="Right to Left Toggle">
      <i class="fa-solid fa-right-left control-btn-icon rtl-icon"></i>
    </button>

    <!-- Dark Mode Toggle -->
    <button class="control-btn" id="darkModeBtn" aria-label="Toggle dark mode" title="Dark Mode Toggle">
      <!-- Sun SVG -->
      <svg class="control-btn-icon sun-icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5" />
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-linecap="round"/>
      </svg>
      <!-- Moon SVG -->
      <svg class="control-btn-icon moon-icon" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Background Grids and Meshes -->
  <div class="bg-grid"></div>
  <div class="bg-mesh-1"></div>
  <div class="bg-mesh-2"></div>

  <!-- Centered Error Card -->
  <div class="error-wrapper">
    <!-- Animated Warning Padlock SVG -->
    <svg class="error-illustration" viewBox="0 0 100 100" width="130" height="130">
      <defs>
        <linearGradient id="glowGold" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="var(--accent-primary)" />
          <stop offset="100%" stop-color="var(--accent-secondary)" />
        </linearGradient>
        <linearGradient id="glowRed" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="var(--danger-primary)" />
          <stop offset="100%" stop-color="#b91c1c" />
        </linearGradient>
      </defs>
      <!-- Shackle in Alert State -->
      <path class="shackle-svg" d="M30,45 V30 A20,20 0 0,1 70,30 V35" stroke="url(#glowRed)" stroke-width="8" stroke-linecap="round" fill="none" />
      <!-- Lock Body -->
      <rect x="20" y="45" width="60" height="45" rx="12" fill="var(--bg-secondary)" stroke="url(#glowGold)" stroke-width="6" />
      <!-- Cyber Keyhole with Alert Warning symbol -->
      <circle cx="50" cy="67" r="9" fill="none" stroke="url(#glowRed)" stroke-width="2.5" />
      <path d="M50,62 L50,68 M50,71 L50,71" stroke="url(#glowRed)" stroke-width="3" stroke-linecap="round" />
    </svg>

    <h1 class="error-code">404</h1>
    <h2 class="error-title">Keyway Not Found</h2>
    <p class="error-desc">
      The requested security clearance path does not exist, or the lock cylinder has been rekeyed. Please verify your credentials or return to the secure terminal home.
    </p>
    
    <a href="index.html" class="btn-terminal">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" style="margin-bottom: -2px; margin-right: 4px; display: inline-block;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Return to Terminal
    </a>
  </div>

  <!-- Floating Action Button (FAB) for Emergency Call -->
  <div class="fab-container">
    <div class="fab-tooltip">24/7 Emergency Call</div>
    <a href="tel:18005555625" class="fab-btn" aria-label="Call Emergency Locksmith 24/7" title="Call Emergency Locksmith 24/7">
      <svg class="fab-icon" viewBox="0 0 24 24">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
      </svg>
    </a>
  </div>

  <!-- Theme & Direction Integration Script -->
  <script>
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }
    }

    function initRtl() {
      const savedRtl = localStorage.getItem('rtl');
      if (savedRtl === 'rtl') {
        document.documentElement.dir = 'rtl';
      } else {
        document.documentElement.dir = 'ltr';
      }
    }

    function toggleTheme() {
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    function toggleRtl() {
      const currentDir = document.documentElement.dir || 'ltr';
      if (currentDir === 'ltr') {
        document.documentElement.dir = 'rtl';
        localStorage.setItem('rtl', 'rtl');
      } else {
        document.documentElement.dir = 'ltr';
        localStorage.setItem('rtl', 'ltr');
      }
    }

    initTheme();
    initRtl();

    document.getElementById('darkModeBtn').addEventListener('click', toggleTheme);
    document.getElementById('rtlToggleBtn').addEventListener('click', toggleRtl);
  </script>
</body>
</html>
